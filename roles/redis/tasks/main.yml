
     - name: Disable redis default version
       command:
         dnf module disable redis -y

     - name: Enable redis 7 version
       command:
          dnf module enable redis:7 -y

     - name: Install redis
       package:
          name: redis
          state: present

     - name: Allow remote connections
       replace:
             path: /etc/redis/redis.conf
             regexp: '127.0.0.1' # To be replaced  
             replace: '0.0.0.0'  # To be replaced with
          
     - name: Disable protected Mode
       lineinfile:
             path: /etc/redis/redis.conf
             regexp: 'protected-mode' # To be replaced  
             line: protected-mode no # To be replaced with

     - name: Start & Enable redis
       service:
           name: redis
           state: started
           enabled: yes

