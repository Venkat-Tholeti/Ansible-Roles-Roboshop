---

- name: Disable Default Nginx
  command: dnf module disable nginx -y

- name: Enable Nginx Version:1.24
  command: dnf module enable nginx:1.24 -y

- name: Install Nginx
  package:
      name: nginx
      state: present
    
- name: Enable & Start Nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Removing HTML Directory
  file:
    path: /usr/share/nginx/html
    state: absent

- name: Create HTML Diectory
  file:
    path: /usr/share/nginx/html
    state: directory

- name: Download The Frontend Code
  get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip
    dest: /tmp/frontend.zip

- name: Unzipping the Content
  unarchive:
    src: /tmp/frontend.zip
    dest: /usr/share/nginx/html
    remote_src: yes

- name: Remove Default Nginx Configuration
  file:
    path: /etc/nginx/nginx.conf
    state: absent

- name: Create Nginx Reverse Proxy Configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
  notify:
    - Restart nginx

