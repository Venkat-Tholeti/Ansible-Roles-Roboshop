---

- name: Copy Catalogue service
  template:
    src: catalogue.service.j2
    dest: /etc/systemd/system/catalogue.service

- name: Daemon Reload
  systemd_service:
    daemon_reload: true

- name: Enabling And Starting catalogue service
  service:
      name: catalogue
      state: restarted # EVEN APP IS NOT RUNNING WE CAN RESTART
      enabled: yes