---

- name: Creating System User
  user:
    name: roboshop
    shell: /sbin/nologin
    system: true
    home: /app

- name: Creating App Directory
  file:
    path: /app
    state: directory 

- name: Download The Catalogue Code
  get_url: 
    url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
    dest: /tmp/catalogue.zip

- name: Unzipping The Catalogue Code
  unarchive:
    src: /tmp/catalogue.zip
    dest: /app 
    remote_src: yes # This means file already exist in catalogue server