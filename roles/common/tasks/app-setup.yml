- name: Creating System User
  user:
      name: roboshop
      shell: /sbin/nologin
      system: true #for system user
      home: /app

- name: Create App Directory
  file: 
    path: /app
    state: directory

- name: Download "{{ component }}" code
  get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/"{{ component }}"-v3.zip 
      dest: /tmp/"{{ component }}".zip

- name: Extract "{{ component }}" code
  unarchive:
      src: /tmp/"{{ component }}".zip
      dest: /app
      remote_src: yes
# remote_src :no (default): file is copied from controller then extracted
# remote_src:yes : file already exists on remote host
    