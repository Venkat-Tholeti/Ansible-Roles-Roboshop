---

    - name: Copy mongodb repo
      copy:
        src: mongodb.repo
        dest: /etc/yum.repos.d/mongo.repo

    - name: Install Mongodb package
      package:
         name: mongodb-org
         state: present

    - name: Starting and  Enabling the service
      service:
         name: mongod
         state: started
         enabled: yes

    - name: Change the config file to allow remote connections
      replace:
        path: /etc/mongod.conf
        regexp: '127.0.0.1'
        replace: '0.0.0.0'
   
    - name: Restart the service
      service:
        name: mongod
        state: restarted




