---

    - name: Install Mysql Server
      package:
        name: mysql-server
        state: present

    - name: Start MYSQL Server
      service:
        name: mysqld
        state: started
        enabled: yes

    - name: Install boto3 and botocore # TO INTERACT WITH AWS SSM PARAMETER TO ENCRYPT AND DECRYPT PASSWORDS
      pip:
       name: "{{ item }}"
      executable: pip3.9
      loop:
      - boto3
      - botocore

    - name: Setup Root Password
      command: mysql_secure_installation --set-root-pass {{ MYSQL_ROOT_PASSWORD }}